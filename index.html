<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="旅録は、大切な人に旅を贈って、その体験を記録として残せるモバイルアプリです。">
  <title>旅録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Old+Mincho:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-shell">
      <div class="status-bar" aria-hidden="true">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <span>5G</span>
          <span class="battery"><i></i></span>
        </div>
      </div>
      <div class="dynamic-island" aria-hidden="true"></div>

      <header class="nav-bar">
        <button class="nav-button hidden" id="navBack" type="button" aria-label="前の画面へ">‹</button>
        <div class="nav-copy">
          <p class="eyebrow" id="navEyebrow">Gift a Journey</p>
          <h1 id="navTitle">旅録</h1>
        </div>
        <div class="nav-badge" id="navBadge">送り主</div>
      </header>

      <div class="phase-strip" aria-label="旅録の流れ">
        <span class="phase-pill active" id="phaseGift">贈る</span>
        <span class="phase-pill" id="phaseTravel">旅する</span>
        <span class="phase-pill" id="phaseAfter">残す</span>
      </div>

      <main class="screen-shell" id="screenShell">
        <div class="screen-view is-forward" id="screenView" aria-live="polite"></div>
      </main>

      <footer class="action-sheet">
        <div class="action-copy">
          <p class="sticky-label">Next Action</p>
          <p class="sticky-text" id="stickyText"></p>
        </div>
        <button class="primary-button" id="primaryAction" type="button"></button>
      </footer>

      <div class="home-indicator" aria-hidden="true"></div>
    </div>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <div class="celebration" id="celebration" aria-hidden="true">
    <article class="celebration-card">
      <p class="section-label">COMPLETE</p>
      <h2 id="celebrationTitle"></h2>
      <p id="celebrationText"></p>
    </article>
  </div>

  <script src="app.js"></script>
</body>
</html>
